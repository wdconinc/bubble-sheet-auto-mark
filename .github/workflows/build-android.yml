name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Patch [tool.briefcase] version (the only static version= line left;
          # [project] version is derived dynamically by setuptools-scm).
          sed -i "s/^version = \".*\"$/version = \"${TAG_VERSION}\"/" pyproject.toml

      - name: Install Briefcase
        run: pip install briefcase

      - name: Get Briefcase version
        run: echo "BRIEFCASE_VERSION=$(pip show briefcase | grep '^Version:' | cut -d' ' -f2)" >> $GITHUB_ENV

      - name: Cache Briefcase tools and SDKs
        uses: actions/cache@v4
        with:
          path: ~/.cache/briefcase
          key: ${{ runner.os }}-briefcase-${{ env.BRIEFCASE_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-briefcase-${{ env.BRIEFCASE_VERSION }}-
            ${{ runner.os }}-briefcase-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          # Gradle files are generated by briefcase at runtime, not committed.
          # pyproject.toml controls gradle_extra_content and Android requires,
          # and the Briefcase version determines the Gradle template/plugin versions used.
          key: ${{ runner.os }}-gradle-${{ env.BRIEFCASE_VERSION }}-${{ hashFiles('pyproject.toml', '**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.BRIEFCASE_VERSION }}-
            ${{ runner.os }}-gradle-

      - name: Create Android project
        run: briefcase create android

      - name: Build Android APK
        run: briefcase build android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubble-sheet-auto-mark-apk
          path: build/bubble-mark/android/gradle/app/build/outputs/apk/**/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: bubble-sheet-auto-mark-apk
          path: apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk/**/*.apk
