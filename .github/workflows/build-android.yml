name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev

      - name: Bootstrap Android SDK for buildozer
        run: |
          BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk

          # Seed buildozer's SDK dir with cmdline-tools from the system image
          mkdir -p $BUILDOZER_SDK/cmdline-tools
          cp -a $ANDROID_HOME/cmdline-tools/latest $BUILDOZER_SDK/cmdline-tools/

          # Buildozer expects sdkmanager at the legacy tools/bin path
          mkdir -p $BUILDOZER_SDK/tools/bin
          ln -sf $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager $BUILDOZER_SDK/tools/bin/sdkmanager

          # Accept all licenses inside buildozer's SDK root
          yes | $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$BUILDOZER_SDK \
            --licenses

      - name: Install Buildozer and Cython
        run: pip install --upgrade buildozer cython

      - name: Cache Buildozer home directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt') }}

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubble-sheet-auto-mark-apk
          path: bin/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: bubble-sheet-auto-mark-apk
          path: bin

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
