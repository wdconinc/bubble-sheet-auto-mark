name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/bubble_mark/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Build with Jekyll
        working-directory: docs
        run: bundle exec jekyll build --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Copy Python package for Pyodide web app
        run: cp -r src/bubble_mark _site/app/bubble_mark

      - name: Generate version.json for web app status bar
        run: |
          python3 - <<'EOF'
          import json, subprocess, pathlib
          def git(*args):
              return subprocess.check_output(['git'] + list(args), text=True).strip()
          tag_out = git('tag', '--points-at', 'HEAD')
          data = {
              'hash':    git('rev-parse', 'HEAD'),
              'tag':     tag_out.splitlines()[0] if tag_out else '',
              'message': git('log', '-1', '--format=%s'),
          }
          pathlib.Path('_site/app/version.json').write_text(json.dumps(data))
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
