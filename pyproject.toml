[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bubble-sheet-auto-mark"
version = "0.1.0"
description = "Cross-platform bubble sheet auto-marking application"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.12"
dependencies = [
    "opencv-python-headless>=4.8",
    "numpy>=1.26",
    "Pillow>=10.0",
]

[project.optional-dependencies]
kivy = [
    "kivy @ git+https://github.com/kivy/kivy.git@dc32205ac51ba5452eb904b2fd78cdafffd64ccd",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
